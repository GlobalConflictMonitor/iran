<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://utteranc.es; object-src 'none';">
    <title>GCM // TACTICAL COMMAND 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="gcm-os-theme">
    <canvas id="world-canvas"></canvas>
    <div id="resonance-ui">
        <header class="panel header">
            <div class="brand">GCM // TACTICAL COMMAND</div>
            <div id="visitor-count">ACTIVE PERSONNEL: --</div>
            <div id="system-clock">00:00:00 UTC</div>
        </header>

        <aside id="tactical-hud" class="panel side-panel">
            <h4 class="panel-label">16D RESONANCE</h4>
            <div id="trend-container">
                <img src="../engine/resonance_trend.png" id="trend-visualizer" alt="Spectral Manifold" onerror="this.style.display='none'">
            </div>
            <div id="sector-intensity"></div>
        </aside>

        <main class="center-stage">
            <div id="ticker-container">
                <div id="ticker-text">AWAITING ENCRYPTED FEED...</div>
            </div>
        </main>

        <aside class="panel side-panel">
            <div class="intel-section">
                <h4>STRIKE LOG // BLACK BOX</h4>
                <div id="audit-log-container"></div>
            </div>
            <div class="comms-section">
                <h4>COMMS // INTEL</h4>
                <div id="comment-box">
                    <script src="https://utteranc.es/client.js" repo="globalconflictmonitor/iran" issue-term="pathname" theme="github-dark" crossorigin="anonymous" async></script>
                </div>
            </div>
        </aside>
    </div>

    <script type="module" src="app.js"></script>

    <script>
        setInterval(() => {
            const clock = document.getElementById('system-clock');
            if (clock) clock.innerText = new Date().toUTCString().split(' ')[4] + ' UTC';
        }, 1000);
    </script>
</body>
</html>
